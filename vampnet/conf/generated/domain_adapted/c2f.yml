$include:
- conf/lora/lora.yml
AudioDataset.duration: 1.0
AudioDataset.loudness_cutoff: -40.0
VampNet.embedding_dim: 1280
VampNet.n_codebooks: 14
VampNet.n_conditioning_codebooks: 4
VampNet.n_heads: 20
VampNet.n_layers: 16
fine_tune: true
fine_tune_checkpoint: ./models/vampnet/c2f.pth
save_path: ./runs/domain_adapted/c2f
train/AudioLoader.sources:
  - training_data/domain_adaptation/train
val/AudioLoader.sources:
  - training_data/domain_adaptation/val
